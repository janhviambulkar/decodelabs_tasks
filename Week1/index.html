<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CareerConnect</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<h1>CareerConnect</h1>

<p>Find Your Dream Internship & Job</p>

</header>

<section class="search">

<input
type="text"
id="search"
placeholder="Search jobs...">

<button onclick="searchJob()">
Search
</button>

</section>

<section class="jobs">

<div class="card">

<h2>Frontend Developer</h2>

<p>Company : DecodeLabs</p>

<p>Location : Remote</p>

<button>Apply</button>

</div>

<div class="card">

<h2>Backend Developer</h2>

<p>Company : Google</p>

<p>Location : Bengaluru</p>

<button>Apply</button>

</div>

<div class="card">

<h2>Data Analyst</h2>

<p>Company : Microsoft</p>

<p>Location : Hyderabad</p>

<button>Apply</button>

</div>

</section>

<script src="script.js"></script>

</body>

</html>
